<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Contacto - TecnoWeb</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #0d6efd;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .contact-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 600px;
            width: 100%;
        }

        .contact-header {
            background: linear-gradient(135deg, var(--primary-color), #764ba2);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .contact-header h2 {
            margin-bottom: 10px;
            font-weight: bold;
        }

        .contact-form {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            display: block;
        }

        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25);
            outline: none;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--primary-color), #764ba2);
            border: none;
            color: white;
            font-weight: 600;
            padding: 12px 40px;
            border-radius: 8px;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(13, 110, 253, 0.3);
            color: white;
            text-decoration: none;
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .form-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary-color);
        }

        .form-info p {
            margin: 0;
            color: #666;
            font-size: 0.95rem;
        }

        .required {
            color: #dc3545;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .contact-form {
                padding: 25px;
            }

            .contact-header {
                padding: 30px 20px;
            }

            .contact-header h2 {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="contact-container">
        <!-- Header -->
        <div class="contact-header">
            <h2><i class="fas fa-envelope me-2"></i>Formulario de Contacto</h2>
            <p class="mb-0">Nos encantaría escuchar de ti</p>
        </div>

        <!-- Formulario -->
        <div class="contact-form">
            <div class="form-info">
                <p>
                    <i class="fas fa-info-circle me-2 text-primary"></i>
                    Completa el formulario y nos pondremos en contacto dentro de 24 horas.
                </p>
            </div>

            <!-- Botón modal -->
            <div class="text-center mb-4">
                <button type="button" class="btn btn-secondary" data-bs-toggle="modal" data-bs-target="#exampleModal">
                    <i class="fas fa-info-circle me-2"></i>Abrir Información
                </button>
            </div>

            <form id="contactForm" method="POST" action="#">
                <!-- Nombre -->
                <div class="form-group">
                    <label for="nombre" class="form-label">
                        Nombre Completo <span class="required">*</span>
                    </label>
                    <input 
                        type="text" 
                        class="form-control" 
                        id="nombre" 
                        name="nombre" 
                        placeholder="Tu nombre"
                        required
                    >
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email" class="form-label">
                        Correo Electrónico <span class="required">*</span>
                    </label>
                    <input 
                        type="email" 
                        class="form-control" 
                        id="email" 
                        name="email" 
                        placeholder="tu@email.com"
                        required
                    >
                </div>

                <!-- Teléfono -->
                <div class="form-group">
                    <label for="telefono" class="form-label">
                        Teléfono (Opcional)
                    </label>
                    <input 
                        type="tel" 
                        class="form-control" 
                        id="telefono" 
                        name="telefono" 
                        placeholder="+54 911 2345 678"
                    >
                </div>

                <!-- Asunto -->
                <div class="form-group">
                    <label for="asunto" class="form-label">
                        Asunto <span class="required">*</span>
                    </label>
                    <input 
                        type="text" 
                        class="form-control" 
                        id="asunto" 
                        name="asunto" 
                        placeholder="¿Cuál es tu consulta?"
                        required
                    >
                </div>

                <!-- Tipo de Servicio -->
                <div class="form-group">
                    <label for="servicio" class="form-label">
                        Servicio de Interés <span class="required">*</span>
                    </label>
                    <select 
                        class="form-control" 
                        id="servicio" 
                        name="servicio"
                        required
                    >
                        <option value="">-- Selecciona un servicio --</option>
                        <option value="diseño-web">Diseño Web</option>
                        <option value="app-movil">Aplicación Móvil</option>
                        <option value="backend">Soluciones Backend</option>
                        <option value="otro">Otro</option>
                    </select>
                </div>

                <!-- Mensaje -->
                <div class="form-group">
                    <label for="mensaje" class="form-label">
                        Mensaje <span class="required">*</span>
                    </label>
                    <textarea 
                        class="form-control" 
                        id="mensaje" 
                        name="mensaje" 
                        placeholder="Cuéntanos más sobre tu proyecto..."
                        required
                    ></textarea>
                </div>

                <!-- Checkbox de términos -->
                <div class="form-group">
                    <div class="form-check">
                        <input 
                            class="form-check-input" 
                            type="checkbox" 
                            id="terminos" 
                            name="terminos"
                            required
                        >
                        <label class="form-check-label" for="terminos">
                            Acepto los <a href="#" class="text-primary">términos y condiciones</a> <span class="required">*</span>
                        </label>
                    </div>
                </div>

                <!-- Botón Submit -->
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-submit flex-fill">
                        <i class="fas fa-paper-plane me-2"></i>Enviar Mensaje
                    </button>
                    <button type="button" class="btn btn-outline-secondary" onclick="resetForm()">
                        <i class="fas fa-undo me-2"></i>Limpiar
                    </button>
                </div>
            </form>

            <!-- Link de regreso -->
            <div class="back-link">
                <a href="index.html">
                    <i class="fas fa-arrow-left me-2"></i>Volver a la página principal
                </a>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="exampleModalLabel">Información Adicional</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Esta es información adicional sobre nuestros servicios. Puedes contactarnos para más detalles.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    <button type="button" class="btn btn-primary">Guardar cambios</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(event) {
            event.preventDefault();
            alert('Mensaje enviado exitosamente!');
            this.reset();
        });
    </script>
</body>
</html>
